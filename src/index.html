<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babylon Game Starter</title>
    <link rel="icon" type="image/png" href="/branding/images/logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        canvas#renderCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Loading screen */
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            --loading-foreground: #111111;
            --loading-spinner-border: rgba(0, 0, 0, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        #loadingScreen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-content {
            text-align: center;
            color: var(--loading-foreground);
        }

        .loading-brand-image {
            display: block;
            margin: 0 auto 16px;
            object-fit: contain;
        }

        .spinner {
            width: 50px;
            height: 50px;
            margin: 0 auto 20px;
            border: 4px solid var(--loading-spinner-border);
            border-radius: 50%;
            border-top-color: var(--loading-foreground);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-content h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .loading-content p {
            font-size: 16px;
            opacity: 0.9;
        }

        /* Debug info */
        #debugInfo {
            position: fixed;
            bottom: 120px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #00ff00;
            padding: 12px 16px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
            line-height: 1.4;
            max-width: 300px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        body.debug-enabled #debugInfo {
            opacity: 1;
        }

        /* FPS Counter */
        #fpsCounter {
            position: fixed;
            bottom: 120px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #00ff00;
            padding: 12px 16px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        body.debug-enabled #fpsCounter {
            opacity: 1;
        }

        .overlay-pos-top-left { top: 120px; left: 20px; right: auto; bottom: auto; }
        .overlay-pos-top-right { top: 120px; right: 20px; left: auto; bottom: auto; }
        .overlay-pos-bottom-left { bottom: 120px; left: 20px; right: auto; top: auto; }
        .overlay-pos-bottom-right { bottom: 120px; right: 20px; left: auto; top: auto; }
    </style>
</head>
<body>
    <!-- Loading screen -->
    <div id="loadingScreen">
        <div class="loading-content">
            <img id="loadingBrandImage" class="loading-brand-image" alt="Brand logo" width="256" height="256" src="/branding/images/Babylon_logo.png">
            <div class="spinner"></div>
            <h1 id="loadingTitle">Babylon Game Starter</h1>
            <p id="loadingSubtitle">Loading your game ...</p>
        </div>
    </div>

    <!-- Render canvas -->
    <canvas id="renderCanvas"></canvas>

    <!-- Debug info -->
    <div id="debugInfo">
        <div><strong>Debug Mode</strong></div>
        <div id="debugContent"></div>
    </div>

    <!-- FPS Counter -->
    <div id="fpsCounter">
        FPS: <span id="fpsValue">0</span>
    </div>

    <!-- Playground-style physics runtime globals -->
    <script src="https://cdn.babylonjs.com/havok/HavokPhysics_umd.js"></script>

    <!-- Main script -->
    <script type="module" src="/main.ts"></script>

    <script type="module">
        import { LOCAL_DEV_DEBUG } from '/config/local-dev.ts';

        const debugInfoEl = document.getElementById('debugInfo');
        const fpsCounterEl = document.getElementById('fpsCounter');
        const fpsValueEl = document.getElementById('fpsValue');
        const debugContentEl = document.getElementById('debugContent');

        const DEFAULT_BRANDING = {
            image: '/branding/images/Babylon_logo.png',
            imageWidth: 256,
            imageHeight: 256,
            bgColor: '#ffffff',
            loadscreenText: 'Babylon Game Starter\nLoading your game ...'
        };

        function applyBranding(brandingConfig) {
            const loadingScreenEl = document.getElementById('loadingScreen');
            const imageEl = document.getElementById('loadingBrandImage');
            const titleEl = document.getElementById('loadingTitle');
            const subtitleEl = document.getElementById('loadingSubtitle');

            if (loadingScreenEl instanceof HTMLElement) {
                const bgColor = typeof brandingConfig.bgColor === 'string' && brandingConfig.bgColor.length > 0
                    ? brandingConfig.bgColor
                    : DEFAULT_BRANDING.bgColor;
                loadingScreenEl.style.background = bgColor;

                const normalizedHex = /^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/.test(bgColor)
                    ? bgColor
                    : DEFAULT_BRANDING.bgColor;
                const hex = normalizedHex.length === 4
                    ? `#${normalizedHex[1]}${normalizedHex[1]}${normalizedHex[2]}${normalizedHex[2]}${normalizedHex[3]}${normalizedHex[3]}`
                    : normalizedHex;
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                const luminance = (0.2126 * r + 0.7152 * g + 0.0722 * b) / 255;
                const foreground = luminance > 0.55 ? '#111111' : '#f5f5f5';
                const spinnerBorder = luminance > 0.55 ? 'rgba(0, 0, 0, 0.25)' : 'rgba(255, 255, 255, 0.35)';

                loadingScreenEl.style.setProperty('--loading-foreground', foreground);
                loadingScreenEl.style.setProperty('--loading-spinner-border', spinnerBorder);
            }

            if (imageEl instanceof HTMLImageElement) {
                const imgSrc = typeof brandingConfig.image === 'string' && brandingConfig.image.length > 0
                    ? brandingConfig.image
                    : DEFAULT_BRANDING.image;
                const imgW = typeof brandingConfig.imageWidth === 'number' ? brandingConfig.imageWidth : DEFAULT_BRANDING.imageWidth;
                const imgH = typeof brandingConfig.imageHeight === 'number' ? brandingConfig.imageHeight : DEFAULT_BRANDING.imageHeight;

                imageEl.src = imgSrc;
                imageEl.width = imgW;
                imageEl.height = imgH;
                imageEl.style.width = `${imgW}px`;
                imageEl.style.height = `${imgH}px`;
            }

            const textValue = typeof brandingConfig.loadscreenText === 'string' && brandingConfig.loadscreenText.length > 0
                ? brandingConfig.loadscreenText
                : DEFAULT_BRANDING.loadscreenText;

            const [title = 'Babylon Game Starter', subtitle = 'Loading your game ...'] = textValue.split(/\r?\n/, 2);

            if (titleEl) {
                titleEl.textContent = title;
            }

            if (subtitleEl) {
                subtitleEl.textContent = subtitle;
            }
        }

        async function loadBrandingConfig() {
            try {
                const response = await fetch('/branding/config.json', { cache: 'no-store' });
                if (!response.ok) {
                    applyBranding(DEFAULT_BRANDING);
                    return;
                }

                const data = await response.json();
                if (data && typeof data === 'object') {
                    applyBranding(data);
                    return;
                }
            } catch {
                // Ignore and use defaults.
            }

            applyBranding(DEFAULT_BRANDING);
        }

        void loadBrandingConfig();

        function isDebugEnabled() {
            if (!LOCAL_DEV_DEBUG.enabled) {
                return false;
            }

            if (!LOCAL_DEV_DEBUG.requireDebugParam) {
                return true;
            }

            const value = new URLSearchParams(window.location.search).get(LOCAL_DEV_DEBUG.paramName);
            return value === 'true';
        }

        function setOverlayPosition(element, position) {
            if (!element) {
                return;
            }

            element.classList.remove(
                'overlay-pos-top-left',
                'overlay-pos-top-right',
                'overlay-pos-bottom-left',
                'overlay-pos-bottom-right'
            );

            element.classList.add(`overlay-pos-${position}`);
        }

        // Initialize loading screen hide after 2 seconds
        // (will be hidden when scene is ready)
        setTimeout(() => {
            const loadingScreen = document.getElementById('loadingScreen');
            if (loadingScreen && !loadingScreen.classList.contains('hidden')) {
                console.log('[index.html] Scene took longer than 2 seconds, hiding loading screen automatically');
                loadingScreen.classList.add('hidden');
            }
        }, 2000);

        const debugEnabled = isDebugEnabled();
        document.body.classList.toggle('debug-enabled', debugEnabled);

        if (debugInfoEl) {
            setOverlayPosition(debugInfoEl, LOCAL_DEV_DEBUG.overlays.stats.position);
            if (!LOCAL_DEV_DEBUG.overlays.stats.enabled) {
                debugInfoEl.style.display = 'none';
            }
        }

        if (fpsCounterEl) {
            setOverlayPosition(fpsCounterEl, LOCAL_DEV_DEBUG.overlays.fps.position);
            if (!LOCAL_DEV_DEBUG.overlays.fps.enabled) {
                fpsCounterEl.style.display = 'none';
            }
        }

        if (!debugEnabled) {
            if (debugInfoEl) debugInfoEl.style.display = 'none';
            if (fpsCounterEl) fpsCounterEl.style.display = 'none';
        }

        // Simple FPS counter
        let frameCount = 0;
        let lastTime = performance.now();
        function updateFPS() {
            if (!debugEnabled || !LOCAL_DEV_DEBUG.overlays.fps.enabled || !fpsValueEl) {
                return;
            }
            frameCount++;
            const currentTime = performance.now();
            if (currentTime - lastTime >= 1000) {
                fpsValueEl.textContent = String(frameCount);
                frameCount = 0;
                lastTime = currentTime;
            }
            requestAnimationFrame(updateFPS);
        }
        if (debugEnabled && LOCAL_DEV_DEBUG.overlays.fps.enabled) {
            updateFPS();
        }

        // Update debug info
        function updateDebugInfo() {
            if (!debugEnabled || !LOCAL_DEV_DEBUG.overlays.stats.enabled || !debugContentEl) {
                return;
            }

            const babylon = (window).__babylon;
            if (babylon) {
                const engine = babylon.engine?.();
                const scene = babylon.scene?.();
                if (engine && scene) {
                    const lines = [];
                    if (LOCAL_DEV_DEBUG.overlays.stats.fields.engine) {
                        lines.push(`<div>Engine: ${engine.webGLVersion === 2 ? 'WebGL 2' : 'WebGL 1'}</div>`);
                    }
                    if (LOCAL_DEV_DEBUG.overlays.stats.fields.meshes) {
                        lines.push(`<div>Meshes: ${scene.meshes.length}</div>`);
                    }
                    if (LOCAL_DEV_DEBUG.overlays.stats.fields.lights) {
                        lines.push(`<div>Lights: ${scene.lights.length}</div>`);
                    }
                    if (LOCAL_DEV_DEBUG.overlays.stats.fields.cameras) {
                        lines.push(`<div>Cameras: ${scene.cameras.length}</div>`);
                    }
                    if (LOCAL_DEV_DEBUG.overlays.stats.fields.materials) {
                        lines.push(`<div>Materials: ${scene.materials.length}</div>`);
                    }
                    debugContentEl.innerHTML = lines.join('');
                }
            }
            requestAnimationFrame(updateDebugInfo);
        }
        if (debugEnabled && LOCAL_DEV_DEBUG.overlays.stats.enabled) {
            updateDebugInfo();
        }

        // Hide loading screen when scene is ready
        function hideLoadingScreen() {
            const loadingScreen = document.getElementById('loadingScreen');
            if (loadingScreen && !loadingScreen.classList.contains('hidden')) {
                console.log('[index.html] Scene ready, hiding loading screen');
                loadingScreen.classList.add('hidden');
            }
        }

        // Hook into Babylon scene ready event
        setInterval(() => {
            const babylon = (window).__babylon;
            if (babylon && babylon.scene?.()) {
                hideLoadingScreen();
            }
        }, 100);
    </script>
</body>
</html>
